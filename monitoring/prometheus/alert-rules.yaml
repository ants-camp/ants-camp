groups:
  - name: antcamp-alerts
    rules:
      - alert: HttpErrorOccurred
        expr: |
          increase(http_server_requests_seconds_count{status=~"[45].."}[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} HTTP 에러 ({{ $labels.status }})"
          description: "{{ $labels.application }} 서비스에서 {{ $labels.method }} {{ $labels.uri }} 요청 시 
          {{ $labels.status }} 에러가 발생했습니다. 예외: {{ $labels.exception }}"

# 운영 기준
      # todo : 개발중엔 ServiceDown 비활성화 함.
#      - alert: ServiceDown
#        expr: up == 0
#        for: 1m
#        labels:
#          severity: critical
#        annotations:
#          summary: "서비스 다운: {{ $labels.job }}"

      - alert: HighCPU
        expr: process_cpu_usage > 0.5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CPU 50% 초과: {{ $labels.job }}"

      - alert: HighMemory
        expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0) > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "JVM Heap 80% 초과: {{ $labels.job }}"
