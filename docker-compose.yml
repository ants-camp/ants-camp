x-java-tz: &java-tz
  TZ: Asia/Seoul
  JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: antcamp-zookeeper
    ports:
      - "${ZOOKEEPER_CLIENT_PORT}:${ZOOKEEPER_CLIENT_PORT}"
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
    healthcheck:
      test: [ "CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep Mode || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - kafka-network

  postgres:
    image: pgvector/pgvector:pg17
    container_name: antcamp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env
    volumes:
      - ./script/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - kafka-network

  eureka-server:
    build:
      context: .
      dockerfile: apps/eureka-server/Dockerfile
    container_name: antcamp-eureka-server
    ports:
      - "${EUREKA_SERVER_PORT}:8761"
    environment:
      <<: *java-tz
      SERVER_PORT: 8761
      EUREKA_INSTANCE_PREFERIPADDRESS: "true"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - kafka-network

  config-server:
    build:
      context: .
      dockerfile: apps/config-server/Dockerfile
    container_name: antcamp-config-server
    ports:
      - "${CONFIG_SERVER_PORT}:8888"
    environment:
      <<: *java-tz
      SERVER_PORT: 8888
      CONFIG_GIT_URI: ${CONFIG_GIT_URI}
      CONFIG_GIT_BRANCH: ${CONFIG_GIT_BRANCH}
      SPRING_CLOUD_CONFIG_ENABLED: "false"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - kafka-network

  gateway-service:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: antcamp-gateway
    ports:
      - "${GATEWAY_SERVER_PORT}:8080"
    environment:
      <<: *java-tz
      SERVER_PORT: 8080
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - kafka-network

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: antcamp-user
    profiles:
      - "prod"
    ports:
      - "${USER_SERVER_PORT}:8082"
    environment:
      <<: *java-tz
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=${USER_SCHEMA}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    env_file:
      - .env
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - kafka-network

  trade-service:
    build:
      context: .
      dockerfile: apps/trade-service/Dockerfile
    container_name: antcamp-trade
    ports:
      - "${TRADE_SERVER_PORT}:8084"
    environment:
      <<: *java-tz
      SERVER_PORT: ${TRADE_SERVER_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=${TRADE_SCHEMA}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_URL: ${SPRING_DATA_REDIS_URL}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      KIS_WS_URL: ${KIS_WS_URL}
      KIS_APPROVAL_URL: ${KIS_APPROVAL_URL}
      KIS_REST_URL: ${KIS_REST_URL}
      KIS_APP_KEY: ${KIS_APP_KEY}
      KIS_APP_SECRET: ${KIS_APP_SECRET}
      KIS_APP_ACCESS: ${KIS_APP_ACCESS}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - kafka-network

  asset-service:
    build:
      context: .
      dockerfile: apps/asset-service/Dockerfile
    container_name: antcamp-asset
    ports:
      - "${ASSET_SERVER_PORT}:8086"
    environment:
      <<: *java-tz
      SERVER_PORT: ${ASSET_SERVER_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=${ASSET_SCHEMA}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}

    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - kafka-network

  competition-service:
    build:
      context: .
      dockerfile: apps/competition-service/Dockerfile
    container_name: antcamp-competition
    ports:
      - "${COMPETITION_SERVER_PORT}:8092"
    environment:
      <<: *java-tz
      SPRING_PROFILES_ACTIVE: default
      SERVER_PORT: ${COMPETITION_SERVER_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=${COMPETITION_SCHEMA}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}

    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - kafka-network

  ranking-service:
    build:
      context: .
      dockerfile: apps/ranking-service/Dockerfile
    container_name: antcamp-ranking
    ports:
      - "${RANKING_SERVER_PORT}:8094"
    environment:
      <<: *java-tz
      SPRING_PROFILES_ACTIVE: default
      SERVER_PORT: ${RANKING_SERVER_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=${RANKING_SCHEMA}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}

    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - kafka-network

  zipkin:
    image: openzipkin/zipkin:3
    container_name: antcamp-zipkin
    ports:
      - "${ZIPKIN_PORT}:9411"
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9411/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kafka-network
    restart: unless-stopped

  assistant-service:
    build:
      context: .
      dockerfile: apps/assistant-service/Dockerfile
    container_name: antcamp-assistant
    ports:
      - "${ASSISTANT_SERVER_PORT}:8096"
    environment:
      <<: *java-tz
      ASSISTANT_SERVER_PORT: ${ASSISTANT_SERVER_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=${ASSISTANT_SCHEMA},public
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - kafka-network

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: antcamp-notification
    ports:
      - "${NOTIFICATION_SERVER_PORT}:8098"
    environment:
      <<: *java-tz
      SERVER_PORT: ${NOTIFICATION_SERVER_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=${NOTIFICATION_SCHEMA}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      PROMETHEUS_URL: http://prometheus:${PROMETHEUS_PORT}
      #todo : GRAFANA_URL 배포 전 변경예정
      GRAFANA_URL: http://localhost:${GRAFANA_PORT}
      LOKI_URL: http://loki:${LOKI_PORT}
      REDIS_HOST: redis
      REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - kafka-network

  redis:
    image: redis:7-alpine
    container_name: antcamp-redis
    ports:
      - "${SPRING_DATA_REDIS_PORT}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - kafka-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: antcamp-kafka
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      # KRaft 설정
      KAFKA_PROCESS_ROLES: broker, controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # 리스너 설정
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # 클러스터 ID
      CLUSTER_ID: O9r3FldJQ3CbTqv1-OQibg

      # 로그 디렉토리
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'

      # 기타 설정
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - kafka-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:${ZOOKEEPER_CLIENT_PORT}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    environment:
      - TZ=Asia/Seoul
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
      - ./monitoring/prometheus/alert-rules.yaml:/etc/prometheus/alert-rules.yaml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.retention.time=14d'
    networks:
      - kafka-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: alertmanager
    ports:
      - "${ALERTMANAGER_PORT}:9093"
    environment:
      - TZ=Asia/Seoul
      - SLACK_ALERTMANAGER_WEBHOOK_URL=${SLACK_ALERTMANAGER_WEBHOOK_URL}
      - WEBHOOK_SHARED_SECRET=${WEBHOOK_SHARED_SECRET}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yaml:/etc/alertmanager/alertmanager.yaml
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - 'sed "s|\$${SLACK_ALERTMANAGER_WEBHOOK_URL}|$$SLACK_ALERTMANAGER_WEBHOOK_URL|g; s|\$${WEBHOOK_SHARED_SECRET}|$$WEBHOOK_SHARED_SECRET|g" /etc/alertmanager/alertmanager.yaml > /tmp/am.yaml && /bin/alertmanager --config.file=/tmp/am.yaml'
    networks:
      - kafka-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - TZ=Asia/Seoul
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    env_file:
      - .env
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - kafka-network
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    environment:
      - TZ=Asia/Seoul
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ./monitoring/loki/loki.yaml:/etc/loki/loki.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/loki.yaml
    networks:
      - kafka-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.0
    container_name: promtail
    environment:
      - TZ=Asia/Seoul
      - DOCKER_API_VERSION=1.44
    volumes:
      - ./monitoring/promtail/promtail.yaml:/etc/promtail/promtail.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - promtail-positions:/tmp
    command: -config.file=/etc/promtail/promtail.yaml
    networks:
      - kafka-network
    restart: unless-stopped
    depends_on:
      - loki


volumes:
  postgres-data:
  redisdata:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-positions:

networks:
  kafka-network:
    driver: bridge
