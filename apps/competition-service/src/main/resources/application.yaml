spring:
  application:
    name: competition-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    hikari:
      pool-name: ${spring.application.name}-hikari
      maximum-pool-size: 10          # DB에 동시에 열 수 있는 최대 커넥션 수 (서비스 수 × 이 값 ≤ DB max_connections)
      minimum-idle: 10               # 항상 유지할 최소 커넥션 수. maximum-pool-size와 같게 두면 고정 크기 풀로 동작 (HikariCP 권장)
      connection-timeout: 3000       # 커넥션을 못 받으면 3초 후 에러 반환
      validation-timeout: 2000       # 커넥션이 살아있는지 확인하는 시간 (connection-timeout보다 작아야 함)
      max-lifetime: 1800000          # 커넥션 하나의 최대 수명 30분. 이 시간 지나면 교체 (DB가 먼저 끊는 것 방지)
      keepalive-time: 120000         # 2분마다 idle 커넥션에 쿼리 날려서 방화벽이 연결 끊는 것 방지
      leak-detection-threshold: 60000 # 커넥션을 1분 넘게 반환 안 하면 경고 로그 출력 (커넥션 누수 감지)
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: competition-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
server:
  port: ${COMPETITION_SERVER_PORT:8092}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true   # P50/P95/P99 히스토그램 활성화 (선결조건: 응답시간 메트릭)
      service-level-objectives:      # 히스토그램 버킷 강제 생성
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s,5s

# [추가] 토픽명 매핑 (CompetitionTopicProperties와 연결)
topics:
  competition:
    registered: ${COMPETITION_REGISTERED}   # 대회 신청 시 발행 → 자산 서비스 컨슘 (개인 계좌 생성)
    finished: ${COMPETITION_FINISHED}       # 대회 종료 시 발행 → 자산 서비스 컨슘 (최종 총자산 계산)
    cancelled: ${COMPETITION_CANCELLED}     # 대회 신청 취소 시 발행 → 자산 서비스 컨슘 (개인 대회 전용 계좌 정리)
    aborted: ${COMPETITION_ABORTED}         # 대회 자체 취소 시 발행 → 참가자 전원 계좌 정리 등 후속 처리 서비스가 컨슘
    ticked: ${COMPETITION_TICKED}           # 매분 00초가 되면 발행, 현재 진행중인 대회id만 담아서 보낸다.
