spring:
  application:
    name: competition-service
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: competition-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
server:
  port: ${COMPETITION_SERVER_PORT:8092}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

# [추가] 토픽명 매핑 (CompetitionTopicProperties와 연결)
topics:
  competition:
    registered: ${COMPETITION_REGISTERED}   # 대회 신청 시 발행 → 자산 서비스 컨슘 (개인 계좌 생성)
    finished: ${COMPETITION_FINISHED}       # 대회 종료 시 발행 → 자산 서비스 컨슘 (최종 총자산 계산)
    cancelled: ${COMPETITION_CANCELLED}     # 대회 신청 취소 시 발행 → 자산 서비스 컨슘 (개인 대회 전용 계좌 정리)
    aborted: ${COMPETITION_ABORTED}         # 대회 자체 취소 시 발행 → 참가자 전원 계좌 정리 등 후속 처리 서비스가 컨슘
    ticked: ${COMPETITION_TICKED}           # 매분 00초가 되면 발행, 현재 진행중인 대회id만 담아서 보낸다.
