server:
  port: ${ASSISTANT_SERVER_PORT}

spring:
  application:
    name: assistant-service
  thymeleaf:
    cache: false
  autoconfigure:
    exclude:
      - org.springframework.ai.model.vertexai.autoconfigure.gemini.VertexAiGeminiChatAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=${ASSISTANT_SCHEMA},public
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ${spring.application.name}-hikari
      maximum-pool-size: 10          # DB에 동시에 열 수 있는 최대 커넥션 수 (서비스 수 × 이 값 ≤ DB max_connections)
      minimum-idle: 10               # 항상 유지할 최소 커넥션 수. maximum-pool-size와 같게 두면 고정 크기 풀로 동작 (HikariCP 권장)
      connection-timeout: 3000       # 커넥션을 못 받으면 3초 후 에러 반환
      validation-timeout: 2000       # 커넥션이 살아있는지 확인하는 시간 (connection-timeout보다 작아야 함)
      max-lifetime: 1800000          # 커넥션 하나의 최대 수명 30분. 이 시간 지나면 교체 (DB가 먼저 끊는 것 방지)
      keepalive-time: 120000         # 2분마다 idle 커넥션에 쿼리 날려서 방화벽이 연결 끊는 것 방지
      leak-detection-threshold: 60000 # 커넥션을 1분 넘게 반환 안 하면 경고 로그 출력 (커넥션 누수 감지)

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
      embedding:
        options:
          model: text-embedding-3-small
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-haiku-4-5-20251001
    vertex:
      ai:
        gemini:
          api-key: ${GEMINI_API_KEY}
          chat:
            options:
              model: gemini-1.5-pro
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536

assistant:
  llm:
    model-name: ${OPENAI_CHAT_MODEL}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true   # P50/P95/P99 히스토그램 활성화 (선결조건: 응답시간 메트릭)
      service-level-objectives:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s,5s