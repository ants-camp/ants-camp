<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Chat Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }

  #top-bar {
    background: #1a1a2e; color: #eee; padding: 10px 16px;
    display: flex; align-items: center; gap: 16px;
    font-size: 13px;
  }
  #top-bar span { color: #aaa; }
  #top-bar strong { color: #7eb8f7; }

  #main { display: flex; flex: 1; overflow: hidden; }

  #session-panel {
    width: 260px; background: #fff; border-right: 1px solid #ddd;
    display: flex; flex-direction: column;
  }
  #session-panel h3 {
    padding: 12px 14px; font-size: 13px; font-weight: 600;
    background: #f8f8f8; border-bottom: 1px solid #eee; color: #444;
    display: flex; justify-content: space-between; align-items: center;
  }
  #btn-new-session {
    background: #4f6ef7; color: #fff; border: none; border-radius: 4px;
    padding: 3px 9px; font-size: 12px; cursor: pointer;
  }
  #btn-new-session:hover { background: #3a58d4; }
  #session-search { padding: 8px 10px; border-bottom: 1px solid #eee; }
  #session-search input {
    width: 100%; padding: 5px 8px; border: 1px solid #ddd;
    border-radius: 4px; font-size: 12px;
  }
  #session-list { overflow-y: auto; flex: 1; }
  .session-item {
    padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-size: 13px;
  }
  .session-item:hover { background: #f5f7ff; }
  .session-item.active { background: #eef1ff; border-left: 3px solid #4f6ef7; }
  .session-item .s-title { font-weight: 500; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-item .s-date  { font-size: 11px; color: #999; margin-top: 2px; }

  #chat-panel { flex: 1; display: flex; flex-direction: column; background: #fff; }
  #chat-header {
    padding: 12px 16px; border-bottom: 1px solid #eee;
    font-size: 13px; color: #555; background: #fafafa;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { display: flex; flex-direction: column; max-width: 72%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot  { align-self: flex-start; }
  .msg-bubble {
    padding: 9px 13px; border-radius: 12px; font-size: 14px;
    line-height: 1.5; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .msg-bubble { background: #4f6ef7; color: #fff; border-bottom-right-radius: 3px; }
  .msg.bot  .msg-bubble { background: #f1f3f9; color: #222; border-bottom-left-radius: 3px; }
  .msg-time { font-size: 11px; color: #aaa; margin-top: 3px; padding: 0 4px; }

  #input-area {
    padding: 12px 16px; border-top: 1px solid #eee;
    display: flex; gap: 8px; background: #fafafa;
  }
  #msg-input {
    flex: 1; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; resize: none; height: 40px;
  }
  #msg-input:focus { outline: none; border-color: #4f6ef7; }
  #btn-send {
    background: #4f6ef7; color: #fff; border: none; border-radius: 8px;
    padding: 0 18px; font-size: 14px; cursor: pointer;
  }
  #btn-send:hover { background: #3a58d4; }
  #btn-send:disabled { background: #aaa; cursor: not-allowed; }
  #empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #bbb; font-size: 14px;
  }
  .loading { color: #aaa; font-size: 13px; font-style: italic; }
  .err { color: #e55; font-size: 12px; }
</style>
</head>
<body>

<div id="top-bar">
  <span>Test User ID: <strong id="lbl-uid"></strong></span>
  <span>Role: <strong id="lbl-role"></strong></span>
</div>

<div id="main">
  <div id="session-panel">
    <h3>세션 <button id="btn-new-session">+ 새 세션</button></h3>
    <div id="session-search">
      <input id="search-input" placeholder="세션 검색...">
    </div>
    <div id="session-list"><p class="loading" style="padding:12px">불러오는 중...</p></div>
  </div>

  <div id="chat-panel">
    <div id="chat-header">세션을 선택하거나 새로 만드세요</div>
    <div id="empty-state">← 왼쪽에서 세션을 선택하세요</div>
    <div id="messages" style="display:none"></div>
    <div id="input-area" style="display:none">
      <textarea id="msg-input" placeholder="메시지 입력 (Enter 전송 / Shift+Enter 줄바꿈)"></textarea>
      <button id="btn-send">전송</button>
    </div>
  </div>
</div>

<script>
  /* ================================================================
   * 테스트용 하드코딩 값 — 실제 DB에 존재하는 유저 UUID로 변경 필요
   * ================================================================ */
  const TEST_USER_ID   = '00000000-0000-0000-0000-000000000001';
  const TEST_USER_ROLE = 'PLAYER';
  /* ============================================================== */

  const BASE = window.location.origin;

  document.getElementById('lbl-uid').textContent  = TEST_USER_ID;
  document.getElementById('lbl-role').textContent = TEST_USER_ROLE;

  const $ = id => document.getElementById(id);
  let currentSessionId = null;
  let sessions = [];

  const apiHeaders = () => ({
    'Content-Type': 'application/json',
    'X-User-Id':   TEST_USER_ID,
    'X-User-Role': TEST_USER_ROLE,
  });

  async function req(method, path, body) {
    const res = await fetch(BASE + '/api/assistants/sessions' + path, {
      method,
      headers: apiHeaders(),
      body: body ? JSON.stringify(body) : undefined,
    });
    const json = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(json.message || `HTTP ${res.status}`);
    return json;
  }

  /* ── 세션 목록 ── */
  async function loadSessions(keyword) {
    const qs = keyword ? `?keyword=${encodeURIComponent(keyword)}` : '';
    try {
      const json = await req('GET', qs);
      sessions = json.data?.items ?? [];
      renderSessions();
    } catch (e) {
      $('session-list').innerHTML = `<p class="err" style="padding:12px">${esc(e.message)}</p>`;
    }
  }

  function renderSessions() {
    if (!sessions.length) {
      $('session-list').innerHTML = '<p style="padding:12px;font-size:13px;color:#aaa">세션이 없습니다</p>';
      return;
    }
    $('session-list').innerHTML = sessions.map((s, i) => `
      <div class="session-item ${s.chatSessionId === currentSessionId ? 'active' : ''}"
           data-idx="${i}">
        <div class="s-title">${esc(s.title || '(제목 없음)')}</div>
        <div class="s-date">${fmtDate(s.updatedAt)}</div>
      </div>`).join('');

    $('session-list').querySelectorAll('.session-item').forEach(el => {
      el.addEventListener('click', () => {
        const s = sessions[el.dataset.idx];
        selectSession(s.chatSessionId, s.title || '(제목 없음)');
      });
    });
  }

  /* ── 세션 생성 ── */
  $('btn-new-session').onclick = async () => {
    try {
      const json = await req('POST', '');
      await loadSessions();
      selectSession(json.data.chatSessionId, json.data.title || '새 세션');
    } catch (e) { alert(e.message); }
  };

  /* ── 세션 선택 ── */
  async function selectSession(id, title) {
    currentSessionId = id;
    renderSessions();
    $('chat-header').innerHTML = `<strong>${esc(title)}</strong> <span style="font-size:11px;color:#aaa;margin-left:8px">${id}</span>`;
    $('empty-state').style.display = 'none';
    $('messages').style.display    = 'flex';
    $('input-area').style.display  = 'flex';
    await loadMessages(id);
  }

  /* ── 메시지 목록 ── */
  async function loadMessages(sessionId) {
    $('messages').innerHTML = '<p class="loading">불러오는 중...</p>';
    try {
      const json = await req('GET', `/${sessionId}/messages`);
      renderMessages(json.data ?? []);
    } catch (e) {
      $('messages').innerHTML = `<p class="err">${esc(e.message)}</p>`;
    }
  }

  function renderMessages(msgs) {
    if (!msgs.length) {
      $('messages').innerHTML = '<p style="color:#bbb;font-size:13px;text-align:center;margin-top:40px">첫 메시지를 보내보세요!</p>';
      return;
    }
    $('messages').innerHTML = msgs.map(m => {
      const isUser = m.role === 'USER';
      return `<div class="msg ${isUser ? 'user' : 'bot'}">
        <div class="msg-bubble">${esc(m.content)}</div>
        <div class="msg-time">${fmtDate(m.createdAt)}</div>
      </div>`;
    }).join('');
    $('messages').scrollTop = $('messages').scrollHeight;
  }

  /* ── 메시지 전송 ── */
  $('btn-send').onclick = sendMessage;
  $('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  async function sendMessage() {
    if (!currentSessionId) return;
    const content = $('msg-input').value.trim();
    if (!content) return;
    $('msg-input').value = '';
    $('btn-send').disabled = true;

    appendMsg('user', content);

    const thinking = Object.assign(document.createElement('div'), { className: 'msg bot' });
    thinking.innerHTML = '<div class="msg-bubble loading">답변 생성 중...</div>';
    $('messages').appendChild(thinking);
    $('messages').scrollTop = $('messages').scrollHeight;

    try {
      const json = await req('POST', `/${currentSessionId}/messages`, { content });
      thinking.remove();
      appendMsg('bot', json.data?.content ?? '(응답 없음)');
      loadSessions();
    } catch (e) {
      thinking.remove();
      appendMsg('bot', `오류: ${e.message}`);
    } finally {
      $('btn-send').disabled = false;
      $('msg-input').focus();
    }
  }

  function appendMsg(type, text) {
    const el = document.createElement('div');
    el.className = `msg ${type}`;
    el.innerHTML = `<div class="msg-bubble">${esc(text)}</div>
      <div class="msg-time">${fmtDate(new Date().toISOString())}</div>`;
    $('messages').appendChild(el);
    $('messages').scrollTop = $('messages').scrollHeight;
  }

  /* ── 검색 ── */
  let searchTimer;
  $('search-input').oninput = () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadSessions($('search-input').value.trim()), 300);
  };

  /* ── 유틸 ── */
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(s) {
    if (!s) return '';
    const d = new Date(s);
    return isNaN(d) ? s : d.toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  }

  loadSessions();
</script>
</body>
</html>
