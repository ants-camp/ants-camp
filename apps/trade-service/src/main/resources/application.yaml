spring:
  application:
    name: trade-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5092/antcamp}
    username: ${SPRING_DATASOURCE_USERNAME:master}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        temp:
          use_jdbc_metadata_defaults: false

  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
      timeout: 36000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "io.antcamp.tradeservice.application.event.producer.TradeCreatedEvent:
        io.antcamp.stockservice.infrastructure.event.consumer.TradeCreatedEvent"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  cloud:
    openfeign:
      httpclient:
        hc5:
          enabled: true

server:
  port: ${SERVER_PORT:8084}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

feign:
  client:
    config:
      paymentClient:
        connectTimeout: 3000
        readTimeout: 5000

resilience4j.retry:
  instances:
    seatService:
      maxAttempts: 3
      waitDuration: 1s
      enableExponentialBackoff: true    # 1초 → 2초 → 4초
      exponentialBackoffMultiplier: 2
      retryExceptions:                 # 이 예외들만 재시도
        - feign.RetryableException
        - java.net.SocketTimeoutException
      ignoreExceptions:                # 이 예외들은 재시도 안 함 (바로 실패)
        - feign.FeignException.BadRequest      # 400
        - feign.FeignException.NotFound        # 404

kis:
  app:
    url: ${KIS_REST_URL}
    approveUrl: ${KIS_APPROVAL_URL}
    key: ${KIS_APP_KEY}
    secret: ${KIS_APP_SECRET}
    access: ${KIS_APP_ACCESS}
  ws:
    url: ${KIS_WS_URL:}