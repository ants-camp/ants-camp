spring:
  application:
    name: trade-service

  # 테스트에서 DB/JPA/Kafka 자동 구성을 비활성화
  # RedisAutoConfiguration 은 제외하지 않음 — RedisConnectionFactory 빈이 필요하기 때문
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration

  data:
    redis:
      host: localhost
      port: 6370          # EmbeddedRedisConfig 가 시작하는 포트 (충돌 방지용 비표준 포트)
      url: redis://localhost:6370   # application.yaml 의 URL 을 덮어씀 (기본값 6379 → 6370)

# ─── KIS 설정 (테스트용 더미값) ─────────────────────────────────────────
# 실제 API 를 호출하는 테스트가 아니므로 더미값으로 채움.
# 실전 통합 테스트 시에는 환경변수로 실제 키 주입.
kis:
  app:
    approveUrl: http://localhost:0/oauth2/tokenP   # @FeignClient url — 필수
    url: http://localhost:0                         # TradeServiceImpl @Value("${kis.app.url}")
    approveUri: /oauth2/tokenP                      # TradeServiceImpl @Value("${kis.app.approveUri}")
    key: PS-test-app-key                            # ${kis.app.key}
    secret: test-secret-key                         # ${kis.app.secret}
    access: test-access-token
  ws:
    url: ws://localhost:0
