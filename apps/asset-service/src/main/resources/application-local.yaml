server:
  port: 8086

spring:

  application:
    name: asset-service

  datasource:
    url: jdbc:h2:mem:assetdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect : org.hibernate.dialect.H2Dialect

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: asset-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "io.antcamp.assetservice.domain.event.payload"

  data:
    redis:
      host: localhost
      port: ${SPRING_DATA_REDIS_PORT:6379}

topics:
  competition:
    started: competition.started
    finished: competition.finished
    ticked: competition.ticked
  asset:
    total-calculated: asset.total-calculated