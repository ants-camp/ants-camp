server:
  port: 8086

spring:
  application:
    name: asset-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ${spring.application.name}-hikari
      maximum-pool-size: 10          # DB에 동시에 열 수 있는 최대 커넥션 수 (서비스 수 × 이 값 ≤ DB max_connections)
      minimum-idle: 10               # 항상 유지할 최소 커넥션 수. maximum-pool-size와 같게 두면 고정 크기 풀로 동작 (HikariCP 권장)
      connection-timeout: 3000       # 커넥션을 못 받으면 3초 후 에러 반환
      validation-timeout: 2000       # 커넥션이 살아있는지 확인하는 시간 (connection-timeout보다 작아야 함)
      max-lifetime: 1800000          # 커넥션 하나의 최대 수명 30분. 이 시간 지나면 교체 (DB가 먼저 끊는 것 방지)
      keepalive-time: 120000         # 2분마다 idle 커넥션에 쿼리 날려서 방화벽이 연결 끊는 것 방지
      leak-detection-threshold: 60000 # 커넥션을 1분 넘게 반환 안 하면 경고 로그 출력 (커넥션 누수 감지)

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        temp:
          use_jdbc_metadata_defaults: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: asset-service
      auto-offset-reset: earliest

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
      timeout: 36000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true   # P50/P95/P99 히스토그램 활성화 (선결조건: 응답시간 메트릭)
      service-level-objectives:      # 히스토그램 버킷 강제 생성
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s,5s

topics:
  competition:
    registered: ${COMPETITION_REGISTERED}
    finished: ${COMPETITION_FINISHED}
    ticked: ${COMPETITION_TICKED}
    cancelled: ${COMPETITION_CANCELLED}
    aborted: ${COMPETITION_ABORTED}
  asset:
    total-calculated: asset.total-calculated
