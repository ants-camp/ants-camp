server:
  port: 8086

spring:
  application:
    name: asset-service

  datasource:
    url: jdbc:h2:mem:assetdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true