spring:
  application:
    name: user-service

  profiles:
    active: ${USER_SPRING_PROFILES_ACTIVE:local}

  config:
    import: optional:configserver:${CONFIG_SERVER_URL}
    
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_SERVER_PORT}/eureka/
