server:
  port: 8083

jwt:
  secret: ${JWT_SECRET}

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**
              filters:
                - CustomAuthFilter

            - id: auth-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/auth/**

            - id: competition-service
              uri: lb://COMPETITION-SERVICE
              predicates:
                - Path=/api/competitions/**

            - id: ranking-service
              uri: lb://RANKING-SERVICE
              predicates:
                - Path=/api/rankings/**

            - id: trade-service
              uri: lb://TRADE-SERVICE
              predicates:
                - Path=/api/trades/**

            - id: asset-service
              uri: lb://ASSET-SERVICE
              predicates:
                - Path=/api/assets/**

            - id: assistant-service
              uri: lb://ASSISTANT-SERVICE
              predicates:
                - Path=/api/assistants/**

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api/notifications/admin/**
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://config-server:8888

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true   # P50/P95/P99 히스토그램 활성화 (선결조건: 응답시간 메트릭)
      service-level-objectives:      # 히스토그램 버킷 강제 생성
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s,5s

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
