#              predicates:
#                - Path=/api/notifications/**
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://config-server:8888

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: when_authorized

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
