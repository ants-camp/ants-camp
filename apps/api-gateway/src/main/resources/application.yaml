server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**
              filters:
                - CustomAuthFilter

            - id: auth-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/auth/**
