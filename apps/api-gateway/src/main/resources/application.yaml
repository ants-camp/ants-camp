server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**
              filters:
                - CustomAuthFilter

            - id: auth-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/auth/**

            - id: competition-service
              uri: lb://COMPETITION-SERVICE
              predicates:
                - Path=/api/competitions,/api/competitions/**

            - id: ranking-service
              uri: lb://RANKING-SERVICE
              predicates:
                - Path=/api/rankings,/api/rankings/**

            - id: trade-service
              uri: lb://TRADE-SERVICE
              predicates:
                - Path=/api/trades,/api/trades/**

            - id: asset-service
              uri: lb://ASSET-SERVICE
              predicates:
                - Path=/api/assets,/api/assets/**,/api/accounts,/api/accounts/**,/api/holdings,/api/holdings/**

            - id: assistant-service
              uri: lb://ASSISTANT-SERVICE
              predicates:
                - Path=/api/assistants,/api/assistants/**

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api/notifications,/api/notifications/**
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://config-server:8888

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: when_authorized

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
