server:
  port: ${SERVER_PORT}

spring:
  application:
    name: notification-service
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=${NOTIFICATION_SCHEMA}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ${spring.application.name}-hikari
      maximum-pool-size: 20         # 커넥션 최대 20개
      minimum-idle: 5
      connection-timeout: 3000
      validation-timeout: 2000
      register-mbeans: true

slack:
  bot-token: ${SLACK_BOT_TOKEN}
  channel-id: ${SLACK_CHANNEL_ID}
  signing-secret: ${SLACK_SIGNING_SECRET}

webhook:
  secret: ${WEBHOOK_SHARED_SECRET}

anthropic:
  api-key: ${ANTHROPIC_API_KEY}

prometheus:
  url: ${PROMETHEUS_URL}

grafana:
  url: ${GRAFANA_URL}

loki:
  url: ${LOKI_URL}

notification:
  infrastructure-jobs:
    - antcamp-eureka-server
    - antcamp-config-server
    - antcamp-gateway
    - antcamp-notification

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true   # P50/P95/P99 히스토그램 활성화 (선결조건: 응답시간 메트릭)
      service-level-objectives:      # 히스토그램 버킷 강제 생성
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s,5s
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: B3
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},%X{traceId:-},%X{spanId:-}]"