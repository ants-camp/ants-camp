server:
  port: ${SERVER_PORT}

spring:
  application:
    name: notification-service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=${NOTIFICATION_SCHEMA}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

slack:
  bot-token: ${SLACK_BOT_TOKEN}
  channel-id: ${SLACK_CHANNEL_ID}
  signing-secret: ${SLACK_SIGNING_SECRET}

webhook:
  secret: ${WEBHOOK_SHARED_SECRET}

anthropic:
  api-key: ${ANTHROPIC_API_KEY}

prometheus:
  url: ${PROMETHEUS_URL}

grafana:
  url: ${GRAFANA_URL}

loki:
  url: ${LOKI_URL}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always