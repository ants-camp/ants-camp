name: AntCamp CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "main"
      - "dev"
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 테스트 제외하고 빌드 수행
      - name: Build with Gradle
        run: ./gradlew build -x test